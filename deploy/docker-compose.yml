name: skiff
networks:
  skiff: {}
volumes:
  temporal-postgres-data: {}
  clickhouse-data: {}
  garage-data: {}
  garage-meta: {}
  nix-store: {} # used in Milestone 5 by the worker container
x-platform: &platform
  platform: ${SKIFF_PLATFORM:-linux/amd64}
services:
  temporal-postgres:
    !!merge <<: *platform
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - "temporal-postgres-data:/var/lib/postgresql/data"
    networks: [skiff]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 12
  temporal:
    !!merge <<: *platform
    image: temporalio/auto-setup:1.25
    depends_on:
      temporal-postgres: {condition: service_healthy}
    ports: ["7233:7233", "8233:8233"]
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    networks: [skiff]
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s
  clickhouse:
    !!merge <<: *platform
    image: clickhouse/clickhouse-server:24.8
    ports: ["8123:8123", "9000:9000"]
    networks: [skiff]
    volumes:
      - "clickhouse-data:/var/lib/clickhouse"
      - "./clickhouse-init:/docker-entrypoint-initdb.d:ro"
      - "./clickhouse-users:/etc/clickhouse-server/users.d:ro"
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 12
  garage:
    !!merge <<: *platform
    image: dxflrs/garage:v1.0.1
    ports: ["3900:3900", "3902:3902"]
    networks: [skiff]
    volumes:
      - "garage-data:/var/lib/garage/data"
      - "garage-meta:/var/lib/garage/meta"
      - "./garage.toml:/etc/garage.toml:ro"
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 12
  garage-bootstrap:
    !!merge <<: *platform
    # Built from Dockerfile.garage-bootstrap: Alpine + /garage binary copied from
    # dxflrs/garage:v1.0.1 (which is scratch-based and has no shell).
    build:
      context: .
      dockerfile: Dockerfile.garage-bootstrap
    depends_on:
      garage: {condition: service_healthy}
    networks: [skiff]
    volumes:
      - "./scripts/bootstrap-garage.sh:/bootstrap.sh:ro"
      - "./scripts:/shared-scripts" # writable; bootstrap drops skiff-keys.env here
      - "garage-data:/var/lib/garage/data"
      - "garage-meta:/var/lib/garage/meta"
      - "./garage.toml:/etc/garage.toml:ro"
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"
  ingest:
    !!merge <<: *platform
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ingest
    depends_on:
      clickhouse: {condition: service_healthy}
      garage: {condition: service_healthy}
      garage-bootstrap: {condition: service_completed_successfully}
    networks: [skiff]
    environment:
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/skiff"
      S3_ENDPOINT: "http://garage:3900"
      S3_REGION: "garage"
      S3_BUCKET_SOURCES: "skiff-sources"
      REGISTRY_URL: "https://replicate.npmjs.com"
      REGISTRY_USER_AGENT: "skiff-ingest/0.1 (+contact@example.invalid)"
      LOG_LEVEL: "info"
      LISTEN_ADDR: ":9090"
    env_file: ["./scripts/skiff-keys.env"] # written by bootstrap; gitignored
    ports: ["9091:9090"]
    restart: unless-stopped
