version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "go"]
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5
  - package-ecosystem: "docker"
    directories:
      - "/deploy"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 5
